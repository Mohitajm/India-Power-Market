# config/phase3b.yaml
# Phase 3B Solar+BESS Two-Stage Optimizer Settings

solver: CBC
n_scenarios: 100
lambda_risk: 0.0
lambda_dev: 2.5
dev_max_mw: 2.5
risk_alpha: 0.1

# Stage 2B reschedule blocks (IST approx: 08:30, 10:30, 12:30, 14:30)
reschedule_blocks: [34, 42, 50, 58]

paths:
  scenarios_dam:   Data/Predictions/joint_dam_scenarios_backtest_recalibrated.parquet
  scenarios_rtm:   Data/Predictions/joint_rtm_scenarios_backtest_recalibrated.parquet
  actuals_dam:     Data/Predictions/dam_quantiles_backtest.csv
  actuals_rtm:     Data/Predictions/rtm_quantiles_backtest.csv
  solar_da_path:   Data/Solar/solar_da.parquet
  solar_nc_path:   Data/Solar/solar_nc.parquet
  solar_at_path:   Data/Solar/solar_actuals.parquet
  results_dir:     results/phase3b_solar
