# config/bess.yaml
# Solar + BESS Physical Parameters
# System: 35 MWp Solar PV (25 MW inverter) + 5 MWh BESS (2.5 MW PCS)
# Location: Jamnagar, Gujarat

# BESS physical
p_max_mw: 2.5
e_max_mwh: 4.75
e_min_mwh: 0.50
eta_charge: 0.9487
eta_discharge: 0.9487

# SOC_start = SOC_end = 2.5 MWh every day (hard equality)
soc_initial_mwh: 2.50
soc_terminal_min_mwh: 2.50

degradation_cost_rs_mwh: 650.0
iex_fee_rs_mwh: 200.0
max_cycles_per_day: null

# Solar PV (35 MWp at Jamnagar 22.47N 70.07E)
solar_capacity_mwp: 35.0

# Solar inverter AC rating (MW) — NEW
# Inverter and PCS outputs connect in parallel to one AC bus.
solar_inverter_mw: 25.0

# Captive consumer PPA rate
ppa_rate_rs_mwh: 3500.0

# SoC planning buffer (5% at ceiling and floor)
soc_buffer_pct: 0.05

# Hard terminal: SoC == 2.5 MWh at end of every day (equality constraint)
soc_terminal_mode: hard
soc_terminal_value_rs_mwh: 0.0

# RTM bid lead time (blocks) — at block B, commit y_c/y_d for block B+3
rtm_lead_blocks: 3

# Captive schedule ramp buffer (blocks) — 12 blocks = 3 hours notice
captive_buffer_blocks: 12
captive_buffer_tolerance_mw: 0.5
